<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>情绪交易监控面板</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .card h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.5em;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }
        
        .stat {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }
        
        .stat:last-child {
            border-bottom: none;
        }
        
        .stat-label {
            color: #666;
            font-weight: 500;
        }
        
        .stat-value {
            color: #333;
            font-weight: bold;
        }
        
        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: bold;
        }
        
        .status-success {
            background: #10b981;
            color: white;
        }
        
        .status-error {
            background: #ef4444;
            color: white;
        }
        
        .status-warning {
            background: #f59e0b;
            color: white;
        }
        
        .refresh-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            display: block;
            margin: 20px auto;
            transition: all 0.3s;
        }
        
        .refresh-btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .loading {
            text-align: center;
            color: white;
            font-size: 1.2em;
            margin: 50px 0;
        }
        
        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
        }
        
        .trade-item {
            background: #f9fafb;
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
            border-left: 4px solid #667eea;
        }
        
        .trade-time {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 5px;
        }
        
        .position-item, .order-item {
            background: #f0f9ff;
            padding: 12px;
            border-radius: 6px;
            margin: 8px 0;
            font-size: 0.95em;
        }
        
        .last-update {
            text-align: center;
            color: white;
            margin-top: 20px;
            font-size: 0.9em;
        }
        
        pre {
            background: #1e293b;
            color: #e2e8f0;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 0.85em;
            max-height: 400px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 情绪交易监控面板</h1>
        
        <button class="refresh-btn" onclick="loadAllData()">🔄 刷新数据</button>
        
        <div id="loading" class="loading">加载中...</div>
        <div id="error" class="error" style="display: none;"></div>
        
        <div id="content" style="display: none;">
            <!-- 概览 -->
            <div class="grid">
                <div class="card">
                    <h2>📊 系统状态</h2>
                    <div class="stat">
                        <span class="stat-label">服务状态</span>
                        <span class="stat-value" id="service-status">-</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">持仓数量</span>
                        <span class="stat-value" id="position-count">-</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">订单数量</span>
                        <span class="stat-value" id="order-count">-</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">总交易次数</span>
                        <span class="stat-value" id="trade-count">-</span>
                    </div>
                </div>
                
                <div class="card">
                    <h2>📈 最近交易</h2>
                    <div id="recent-trades">暂无数据</div>
                </div>
            </div>
            
            <!-- 持仓 -->
            <div class="card">
                <h2>💼 当前持仓</h2>
                <div id="positions">暂无持仓</div>
            </div>
            
            <!-- 订单 -->
            <div class="card">
                <h2>📝 未完成订单</h2>
                <div id="orders">暂无订单</div>
            </div>
            
            <!-- 原始数据 -->
            <div class="card">
                <h2>🔍 原始数据</h2>
                <pre id="raw-data"></pre>
            </div>
        </div>
        
        <div class="last-update" id="last-update"></div>
    </div>
    
    <script>
        const API_BASE = 'http://localhost:5002';
        
        async function loadAllData() {
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const content = document.getElementById('content');
            
            loading.style.display = 'block';
            error.style.display = 'none';
            content.style.display = 'none';
            
            try {
                const response = await fetch(`${API_BASE}/api/status`);
                if (!response.ok) throw new Error('API请求失败');
                
                const data = await response.json();
                displayData(data);
                
                loading.style.display = 'none';
                content.style.display = 'block';
                
                document.getElementById('last-update').textContent = 
                    `最后更新: ${new Date().toLocaleString('zh-CN')}`;
                    
            } catch (e) {
                loading.style.display = 'none';
                error.style.display = 'block';
                error.textContent = `加载失败: ${e.message}. 请确保API服务正在运行 (端口5002)`;
            }
        }
        
        function displayData(data) {
            // 服务状态
            const statusEl = document.getElementById('service-status');
            statusEl.innerHTML = '<span class="status-badge status-success">运行中</span>';
            
            // 统计数据
            document.getElementById('position-count').textContent = 
                data.data.positions.count || 0;
            document.getElementById('order-count').textContent = 
                data.data.orders.count || 0;
            document.getElementById('trade-count').textContent = 
                data.data.history.total_count || 0;
            
            // 最近交易
            const tradesEl = document.getElementById('recent-trades');
            const trades = data.data.history.recent_trades || [];
            if (trades.length === 0) {
                tradesEl.innerHTML = '<p style="color: #999;">暂无交易记录</p>';
            } else {
                tradesEl.innerHTML = trades.map(trade => `
                    <div class="trade-item">
                        <div class="trade-time">${new Date(trade.timestamp).toLocaleString('zh-CN')}</div>
                        <div><strong>策略:</strong> ${trade.strategy_type}</div>
                        <div><strong>状态:</strong> ${trade.success ? 
                            '<span class="status-badge status-success">成功</span>' : 
                            '<span class="status-badge status-error">失败</span>'}</div>
                    </div>
                `).join('');
            }
            
            // 持仓
            const positionsEl = document.getElementById('positions');
            const positions = data.data.positions.items || [];
            if (positions.length === 0) {
                positionsEl.innerHTML = '<p style="color: #999;">暂无持仓</p>';
            } else {
                positionsEl.innerHTML = positions.map(pos => `
                    <div class="position-item">
                        <strong>${pos.instrument_name || 'N/A'}</strong> - 
                        数量: ${pos.size || 0} - 
                        方向: ${pos.direction || 'N/A'}
                    </div>
                `).join('');
            }
            
            // 订单
            const ordersEl = document.getElementById('orders');
            const orders = data.data.orders.items || [];
            if (orders.length === 0) {
                ordersEl.innerHTML = '<p style="color: #999;">暂无未完成订单</p>';
            } else {
                ordersEl.innerHTML = orders.map(order => `
                    <div class="order-item">
                        <strong>${order.instrument_name || 'N/A'}</strong> - 
                        ${order.direction || 'N/A'} ${order.amount || 0} @ ${order.price || 0}
                    </div>
                `).join('');
            }
            
            // 原始数据
            document.getElementById('raw-data').textContent = 
                JSON.stringify(data, null, 2);
        }
        
        // 页面加载时自动获取数据
        loadAllData();
        
        // 每30秒自动刷新
        setInterval(loadAllData, 30000);
    </script>
</body>
</html>
